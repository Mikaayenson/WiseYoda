name: Python Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --extra dev --extra api --python ${{ matrix.python-version }}

      # Pin interpreter on every `uv run` so `.python-version` does not recreate the venv mid-job.
      - name: Ruff (lint + format)
        run: |
          uv run --python ${{ matrix.python-version }} ruff check wise_yoda tests
          uv run --python ${{ matrix.python-version }} ruff format --check wise_yoda tests

      - name: Tests
        run: uv run --python ${{ matrix.python-version }} pytest

      - name: Build package
        run: uv build

      - name: CLI smoke
        run: |
          uv run --python ${{ matrix.python-version }} wiseyoda stats
          uv run --python ${{ matrix.python-version }} wiseyoda version
